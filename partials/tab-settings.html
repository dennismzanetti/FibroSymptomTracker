  <!-- ============================================================
       SETTINGS TAB
       ============================================================ -->
  <section id="settings-tab" class="tab" style="padding-bottom:80vh;">
    <h2>Settings</h2>

    <!-- Anchor Navigation -->
    <nav id="settingsAnchorNav" aria-label="Settings sections" class="med-sub-tabs">
      <a href="#settings-account"     class="ct-sub-tab-btn active">Account</a>
      <a href="#settings-display"     class="ct-sub-tab-btn">Display</a>
      <a href="#settings-export"      class="ct-sub-tab-btn">Export &amp; Import</a>
      <a href="#settings-about"       class="ct-sub-tab-btn">About</a>
      <a href="#settings-diagnostics" class="ct-sub-tab-btn">Diagnostics</a>
    </nav>

    <!-- Account Info -->
    <div id="settings-account" class="card" style="scroll-margin-top:60px;">
      <h3>Account</h3>
      <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;">
        <!-- Left: avatar + name/email -->
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <img id="settingsUserPhoto" src="" alt="" width="48" height="48"
               style="border-radius:50%;display:none;object-fit:cover;flex-shrink:0;" />
          <div id="settingsUserInitials"
               style="display:none;width:48px;height:48px;border-radius:50%;background:var(--color-primary);color:white;font-weight:700;font-size:var(--text-lg);align-items:center;justify-content:center;flex-shrink:0;"></div>
          <div>
            <p id="settingsUserName" style="font-weight:600;margin:0;font-size:var(--text-base);"></p>
            <p id="settingsUserEmail" style="color:var(--color-text-muted);font-size:var(--text-sm);margin:0;"></p>
          </div>
        </div>
        <!-- Right: sign out -->
        <button id="settingsSignOutBtn" class="btn btn-danger" style="flex-shrink:0;">Sign out</button>
      </div>
    </div>

    <!-- Display Preferences -->
    <div id="settings-display" class="card" style="scroll-margin-top:60px;">
      <h3>Display</h3>
      <div class="form-group">
        <label for="settingsThemeSelect">Theme</label>
        <select id="settingsThemeSelect">
          <option value="system">System default</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <div class="form-group">
        <label for="settingsDefaultTabSelect">Default tab on open</label>
        <select id="settingsDefaultTabSelect">
          <option value="entry-tab">Daily Entry</option>
          <option value="journal-tab">Journal</option>
          <option value="history-tab">History</option>
          <option value="trends-tab">Trends</option>
          <option value="mood-tab">Mood</option>
          <option value="medications-tab">Medications</option>
          <option value="conditions-tab">Conditions</option>
          <option value="careteam-tab">Care Team</option>
        </select>
      </div>
      <button id="settingsSaveDisplayBtn" class="btn btn-primary">Save Display Settings</button>
      <p id="settingsDisplayStatus" style="margin-top:var(--space-2);font-size:var(--text-sm);color:var(--color-success);display:none;">&#10003; Saved</p>
    </div>

    <!-- Export / Import -->
    <div id="settings-export" class="card" style="scroll-margin-top:60px;">
      <h3>Export &amp; Import Data</h3>
      <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-4);">Download a full backup of all your data, or restore from a previous backup file.</p>

      <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;margin-bottom:var(--space-4);">
        <button id="exportDataBtn" class="btn btn-primary">&#8659; Export All Data</button>
        <label class="btn" style="background:var(--color-surface-offset);color:var(--color-text);cursor:pointer;">
          &#8657; Import Backup
          <input type="file" id="importFileInput" accept=".json" style="display:none;" />
        </label>
      </div>

      <div id="importConfirmBox" style="display:none;background:var(--color-surface-offset);border-radius:var(--radius-md);padding:var(--space-4);margin-bottom:var(--space-3);">
        <p id="importConfirmMsg" style="margin-bottom:var(--space-3);font-size:var(--text-sm);"></p>
        <div style="display:flex;gap:var(--space-2);">
          <button id="importConfirmBtn" class="btn btn-primary">Yes, import</button>
          <button id="importCancelBtn" class="btn btn-cancel">Cancel</button>
        </div>
      </div>

      <p id="exportImportStatus" style="display:none;padding:var(--space-3);border-radius:var(--radius-md);font-size:var(--text-sm);"></p>
    </div>

    <!-- About -->
    <div id="settings-about" class="card" style="scroll-margin-top:60px;">
      <h3>About</h3>
      <div id="settingsAboutCommits">
        <p style="color:var(--color-text-muted);font-size:var(--text-sm);">Loading commit history&hellip;</p>
      </div>
    </div>

    <!-- Diagnostics -->
    <div id="settings-diagnostics" class="card" style="scroll-margin-top:60px;">
      <h3>Developer Diagnostics</h3>
      <div id="diagToggleContent"></div>
    </div>

  </section>

  <!-- Anchor nav active-state highlighting via IntersectionObserver -->
  <script>
  (function () {
    function initSettingsAnchorNav() {
      const nav = document.getElementById('settingsAnchorNav');
      if (!nav) return;

      const links = nav.querySelectorAll('.ct-sub-tab-btn');
      const sectionIds = ['settings-account', 'settings-display', 'settings-export', 'settings-about', 'settings-diagnostics'];

      function setActive(id) {
        links.forEach(link => {
          const isActive = link.getAttribute('href') === '#' + id;
          link.classList.toggle('active', isActive);
        });
      }

      // Set first as default active
      if (sectionIds.length) setActive(sectionIds[0]);

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) setActive(entry.target.id);
        });
      }, {
        root: null,
        rootMargin: '-30% 0px -60% 0px',
        threshold: 0
      });

      sectionIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) observer.observe(el);
      });

      // Smooth scroll on click
      links.forEach(link => {
        link.addEventListener('click', e => {
          e.preventDefault();
          const targetId = link.getAttribute('href').slice(1);
          const target = document.getElementById(targetId);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('partialsLoaded', initSettingsAnchorNav);
    } else {
      setTimeout(initSettingsAnchorNav, 0);
    }
  })();
  </script>

</main>
