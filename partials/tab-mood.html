  <!-- Mood Tab -->
  <section id="mood-tab" class="tab">
    <h2>Mood</h2>
    <div id="moodContent">

      <!-- Stat strip -->
      <div class="mood-stat-strip">
        <div class="mood-stat-item">
          <div class="mood-stat-value" id="moodAvgScore">—</div>
          <div class="mood-stat-label">14-Day Avg</div>
        </div>
        <div class="mood-stat-item">
          <div class="mood-stat-value mood-stat-best" id="moodHighScore">—</div>
          <div class="mood-stat-label">Best Day</div>
        </div>
        <div class="mood-stat-item">
          <div class="mood-stat-value mood-stat-hard" id="moodLowScore">—</div>
          <div class="mood-stat-label">Hardest Day</div>
        </div>
      </div>

      <!-- 14-Day Trend Chart -->
      <div class="card">
        <div class="mood-card-header">
          <h3>14-Day Mood Trend</h3>
          <span class="mood-card-badge">Last 14 days</span>
        </div>
        <div class="mood-chart-wrap">
          <canvas id="moodTrendChart"></canvas>
        </div>
        <div class="mood-chart-legend">
          <div class="mood-legend-item"><div class="mood-legend-dot mood-legend-dot-filled"></div>Score (hover for notes)</div>
          <div class="mood-legend-item"><div class="mood-legend-dot mood-legend-dot-note"></div>Has notes</div>
        </div>
      </div>

      <!-- 14-Day Notes Table -->
      <div class="card">
        <div class="mood-card-header">
          <h3>Mood Notes</h3>
          <span class="mood-card-badge" id="moodNotesCount"></span>
        </div>
        <div class="mood-notes-table-wrap">
          <table class="mood-notes-table" aria-label="14-day mood notes">
            <thead>
              <tr>
                <th>Date</th>
                <th>Score</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="moodSummaryBody">
              <tr><td colspan="3" class="mood-table-empty">Loading&#8230;</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ATR Form -->
      <div class="card">
        <h3 id="atrFormTitle">New Automatic Thought Record</h3>
        <div class="form-group">
          <label for="atrDateInput">Date</label>
          <input type="date" id="atrDateInput" />
        </div>
        <div class="form-group">
          <label for="atrSituationInput">Situation</label>
          <textarea id="atrSituationInput" rows="2" placeholder="What were you doing / what happened?"></textarea>
        </div>
        <div class="form-group">
          <label for="atrEmotionsInput">Emotions</label>
          <input type="text" id="atrEmotionsInput" placeholder="e.g. anxious, sad, angry" />
        </div>
        <div class="form-group">
          <label for="atrIntensityRange">Intensity (0&#8211;100)</label>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <input type="range" id="atrIntensityRange" min="0" max="100" value="50" style="flex:1;" />
            <span id="atrIntensityDisplay" style="min-width:2rem;text-align:right;">50</span>
          </div>
        </div>
        <div class="form-group">
          <label for="atrAutoThoughtInput">Automatic thought</label>
          <textarea id="atrAutoThoughtInput" rows="2" placeholder="What went through your mind?"></textarea>
        </div>
        <div class="form-group">
          <label for="atrAltThoughtInput">Alternative / balanced thought</label>
          <textarea id="atrAltThoughtInput" rows="2" placeholder="A more balanced way of seeing it (optional)"></textarea>
        </div>
        <input type="hidden" id="atrEditingId" />
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.5rem;">
          <button id="saveAtrBtn" class="btn btn-primary">Save Record</button>
          <button id="cancelAtrEditBtn" class="save-btn" style="display:none;background:var(--color-surface-offset);color:var(--color-text);">Cancel</button>
        </div>
      </div>

      <!-- Thought Records list -->
      <div class="card">
        <h3>Thought Records</h3>
        <div id="atrList"><p class="atr-empty">No records yet.</p></div>
      </div>

    </div>
  </section>
