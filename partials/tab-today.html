  <!-- Daily Entry Tab -->
  <section id="entry-tab" class="tab active">
    <!-- Floating Save Day button -->
    <button id="saveDayFloat" class="save-day-float primary" aria-label="Save Day">&#128190; Save Day</button>

    <!-- TITLE ROW: heading + date navigation on same line -->
    <div class="entry-title-row">
      <h2 class="entry-tab-heading">Daily Entry</h2>

      <!-- DATE BAR -->
      <div class="entry-date-bar">
        <button type="button" id="prevDayBtn" class="entry-date-nav-btn" aria-label="Previous day" title="Previous day">&#8249;</button>
        <button type="button" id="datePickerBtn" class="entry-date-picker-btn" aria-label="Pick a date" title="Click to choose a date">
          <span id="dayOfWeekDisplay" class="entry-dow"></span>
          <span id="dateDisplay" class="entry-date-text"></span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </button>
        <input type="date" id="dateInput" aria-label="Entry date" class="sr-date-input" tabindex="-1" aria-hidden="true">
        <button type="button" id="nextDayBtn" class="entry-date-nav-btn" aria-label="Next day" title="Next day">&#8250;</button>
      </div>
    </div>

    <!-- Day Info -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Day Info</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div class="form-group">
          <label for="dayTitleInput">Day title (optional)</label>
          <input type="text" id="dayTitleInput" placeholder="Flare day, Better day, travel, etc." />
        </div>
        <div class="form-group">
          <label for="overallNotesInput">Overall notes</label>
          <textarea id="overallNotesInput" rows="3" placeholder="Big events, stress, weather, etc."></textarea>
        </div>
      </div>
    </details>

    <!-- Quick Tags -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Quick Tags (optional)</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div id="tagsContainer">

          <label class="tag-pill tag-flare">
            <input type="checkbox" value="flare" />
            <span class="tag-pill-icon" aria-hidden="true">&#x1F525;</span>
            <span class="tag-pill-label">Flare</span>
          </label>

          <label class="tag-pill tag-crash">
            <input type="checkbox" value="crash" />
            <span class="tag-pill-icon" aria-hidden="true">&#x26A1;</span>
            <span class="tag-pill-label">Crash / post-exertional</span>
          </label>

          <label class="tag-pill tag-better">
            <input type="checkbox" value="better" />
            <span class="tag-pill-icon" aria-hidden="true">&#x2728;</span>
            <span class="tag-pill-label">Better than usual</span>
          </label>

          <label class="tag-pill tag-poor-sleep">
            <input type="checkbox" value="poor_sleep" />
            <span class="tag-pill-icon" aria-hidden="true">&#x1F319;</span>
            <span class="tag-pill-label">Poor sleep</span>
          </label>

          <label class="tag-pill tag-stress">
            <input type="checkbox" value="high_stress" />
            <span class="tag-pill-icon" aria-hidden="true">&#x1F4A2;</span>
            <span class="tag-pill-label">High stress</span>
          </label>

          <label class="tag-pill tag-weather">
            <input type="checkbox" value="weather_change" />
            <span class="tag-pill-icon" aria-hidden="true">&#x1F327;&#xFE0F;</span>
            <span class="tag-pill-label">Weather change</span>
          </label>

        </div>
      </div>
    </details>

    <!-- Mood -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Mood</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div class="form-group">
          <label for="moodScoreInput">Mood score (1&#8211;10)</label>
          <div class="number-stepper">
            <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease mood score">&#8722;</button>
            <input type="number" min="1" max="10" id="moodScoreInput" inputmode="numeric" />
            <button type="button" class="stepper-btn" data-step="1" aria-label="Increase mood score">+</button>
          </div>
        </div>
        <div class="form-group">
          <label for="moodNotesInput">Mood notes</label>
          <textarea id="moodNotesInput" rows="3" placeholder="Anxious, low, ok, calm, etc."></textarea>
        </div>
      </div>
    </details>

    <!-- Functionality by Time of Day -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Functionality by Time of Day</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">

        <!-- Early Morning -->
        <div class="time-block">
          <h4>Early morning (5&#8211;9 am)</h4>
          <div class="form-group">
            <label for="earlyMorningScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease early morning functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="earlyMorningScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase early morning functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="earlyMorningActivity">What I was doing</label>
            <input type="text" id="earlyMorningActivity" />
          </div>
          <div class="form-group">
            <label for="earlyMorningSymptoms">Symptoms / how it felt</label>
            <textarea id="earlyMorningSymptoms" rows="2"></textarea>
          </div>
        </div>

        <!-- Late Morning -->
        <div class="time-block">
          <h4>Late morning (9&#8211;12)</h4>
          <div class="form-group">
            <label for="lateMorningScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease late morning functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="lateMorningScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase late morning functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="lateMorningActivity">What I was doing</label>
            <input type="text" id="lateMorningActivity" />
          </div>
          <div class="form-group">
            <label for="lateMorningSymptoms">Symptoms / how it felt</label>
            <textarea id="lateMorningSymptoms" rows="2"></textarea>
          </div>
        </div>

        <!-- Early Afternoon -->
        <div class="time-block">
          <h4>Early afternoon (12&#8211;3)</h4>
          <div class="form-group">
            <label for="earlyAfternoonScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease early afternoon functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="earlyAfternoonScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase early afternoon functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="earlyAfternoonActivity">What I was doing</label>
            <input type="text" id="earlyAfternoonActivity" />
          </div>
          <div class="form-group">
            <label for="earlyAfternoonSymptoms">Symptoms / how it felt</label>
            <textarea id="earlyAfternoonSymptoms" rows="2"></textarea>
          </div>
        </div>

        <!-- Late Afternoon -->
        <div class="time-block">
          <h4>Late afternoon (3&#8211;6)</h4>
          <div class="form-group">
            <label for="lateAfternoonScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease late afternoon functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="lateAfternoonScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase late afternoon functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="lateAfternoonActivity">What I was doing</label>
            <input type="text" id="lateAfternoonActivity" />
          </div>
          <div class="form-group">
            <label for="lateAfternoonSymptoms">Symptoms / how it felt</label>
            <textarea id="lateAfternoonSymptoms" rows="2"></textarea>
          </div>
        </div>

        <!-- Early Evening -->
        <div class="time-block">
          <h4>Early evening (6&#8211;9)</h4>
          <div class="form-group">
            <label for="earlyEveningScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease early evening functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="earlyEveningScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase early evening functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="earlyEveningActivity">What I was doing</label>
            <input type="text" id="earlyEveningActivity" />
          </div>
          <div class="form-group">
            <label for="earlyEveningSymptoms">Symptoms / how it felt</label>
            <textarea id="earlyEveningSymptoms" rows="2"></textarea>
          </div>
        </div>

        <!-- Late Evening -->
        <div class="time-block">
          <h4>Late evening (9&#8211;12)</h4>
          <div class="form-group">
            <label for="lateEveningScore">Functionality score (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease late evening functionality score">&#8722;</button>
              <input type="number" min="1" max="10" id="lateEveningScore" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase late evening functionality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="lateEveningActivity">What I was doing</label>
            <input type="text" id="lateEveningActivity" />
          </div>
          <div class="form-group">
            <label for="lateEveningSymptoms">Symptoms / how it felt</label>
            <textarea id="lateEveningSymptoms" rows="2"></textarea>
          </div>
        </div>

      </div>
    </details>

    <!-- Sleep -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Sleep (previous night)</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div class="sleep-time-grid">
          <label class="time-widget-label-wrap">
            <span class="time-widget-label">Bedtime</span>
            <input type="time" id="bedtimeInput" step="900" class="time-input-single" aria-label="Bedtime" />
          </label>
          <label class="time-widget-label-wrap">
            <span class="time-widget-label">Wake time</span>
            <input type="time" id="wakeTimeInput" step="900" class="time-input-single" aria-label="Wake time" />
          </label>
        </div>
        <div class="sleep-total-display" aria-live="polite">
          <span class="sleep-total-label">Total hours slept</span>
          <span id="hoursSleptDisplay" class="sleep-total-value">&#8212;</span>
          <input type="hidden" id="hoursSleptInput" />
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label for="sleepQualityInput">Sleep quality (1&#8211;10)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease sleep quality score">&#8722;</button>
              <input type="number" min="1" max="10" id="sleepQualityInput" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase sleep quality score">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="awakeningsInput">Number of awakenings</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-1" aria-label="Decrease number of awakenings">&#8722;</button>
              <input type="number" min="0" max="20" id="awakeningsInput" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="1" aria-label="Increase number of awakenings">+</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="sleepNotesInput">Sleep notes</label>
          <textarea id="sleepNotesInput" rows="3"></textarea>
        </div>
      </div>
    </details>

    <!-- Exercise / Activity -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Exercise / Activity</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div class="form-group">
          <label for="didExerciseInput">Did you do planned exercise or notable activity?</label>
          <select id="didExerciseInput"><option value="no">No</option><option value="yes">Yes</option></select>
        </div>
        <div id="exerciseDetails">
          <div class="form-row form-row-2">
            <div class="form-group">
              <label for="exerciseTypeInput">Type</label>
              <select id="exerciseTypeInput">
                <option value="">Select...</option>
                <option value="walk">Walk</option>
                <option value="stretching">Stretching</option>
                <option value="pt">Physical therapy</option>
                <option value="strength">Strength</option>
                <option value="yoga">Yoga</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="exerciseMinutesInput">Duration (minutes)</label>
              <input type="number" min="0" id="exerciseMinutesInput" />
            </div>
          </div>
          <div class="form-row form-row-2">
            <div class="form-group">
              <label for="exerciseIntensityInput">Intensity</label>
              <select id="exerciseIntensityInput">
                <option value="">Select...</option>
                <option value="gentle">Gentle</option>
                <option value="moderate">Moderate</option>
                <option value="overdid">Pushed too hard</option>
              </select>
            </div>
            <div class="form-group">
              <label for="exerciseTimingInput">Timing</label>
              <select id="exerciseTimingInput">
                <option value="">Select...</option>
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="exerciseNotesInput">Exercise notes</label>
            <textarea id="exerciseNotesInput" rows="3"></textarea>
          </div>
        </div>
      </div>
    </details>

    <!-- Meditation -->
    <details class="entry-section" open>
      <summary class="entry-section-summary">
        <span class="entry-section-title">Meditation</span>
        <svg class="entry-section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="entry-section-body card">
        <div class="form-group">
          <label for="didMeditateInput">Did you meditate today?</label>
          <select id="didMeditateInput"><option value="no">No</option><option value="yes">Yes</option></select>
        </div>
        <div id="meditationDetails">
          <div class="form-group">
            <label for="meditationMinutesInput">Duration (minutes)</label>
            <div class="number-stepper">
              <button type="button" class="stepper-btn" data-step="-5" aria-label="Decrease meditation minutes">&#8722;</button>
              <input type="number" min="0" id="meditationMinutesInput" inputmode="numeric" />
              <button type="button" class="stepper-btn" data-step="5" aria-label="Increase meditation minutes">+</button>
            </div>
          </div>
          <div class="form-group">
            <label for="meditationNotesInput">Description</label>
            <textarea id="meditationNotesInput" rows="3" placeholder="Type, style, how it felt, etc."></textarea>
          </div>
        </div>
      </div>
    </details>

  </section>
