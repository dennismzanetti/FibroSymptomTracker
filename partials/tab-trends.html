  <!-- Trends Tab -->
  <section id="trends-tab" class="tab">
    <h2>Trends</h2>
    <p>Average daily functionality (all six time blocks combined).</p>
    <div class="trends-filter-bar">
      <button class="trends-filter-btn active" data-days="7">7 Days</button>
      <button class="trends-filter-btn" data-days="30">30 Days</button>
      <button class="trends-filter-btn" data-days="90">90 Days</button>
      <button class="trends-filter-btn" data-days="0">All</button>
    </div>
    <canvas id="functionalityChart" height="200"></canvas>
  </section>
