  <!-- Trends Tab -->
  <section id="trends-tab" class="tab">
    <h2>Trends</h2>
    <p class="text-muted">Average daily scores across your logged days.</p>

    <!-- Stat Cards -->
    <div class="trends-stat-cards" id="trendsStatCards">

      <!-- Functionality -->
      <div class="trends-stat-card trends-stat-card--func">
        <div class="stat-category">
          <span class="stat-dot"></span>
          Functionality
        </div>
        <div class="stat-value-row">
          <span class="stat-value" id="statFuncAvg7">—</span>
          <span class="stat-unit">/ 10</span>
        </div>
        <div class="stat-periods">
          <div class="stat-period">
            <span class="stat-period-label">7-Day</span>
            <span class="stat-period-value" id="statFuncAvg7Sub">—</span>
          </div>
          <div class="stat-period">
            <span class="stat-period-label">30-Day</span>
            <span class="stat-period-value" id="statFuncAvg30">—</span>
          </div>
        </div>
        <span class="stat-trend" id="statFuncTrend">—</span>
      </div>

      <!-- Mood -->
      <div class="trends-stat-card trends-stat-card--mood">
        <div class="stat-category">
          <span class="stat-dot"></span>
          Mood
        </div>
        <div class="stat-value-row">
          <span class="stat-value" id="statMoodAvg7">—</span>
          <span class="stat-unit">/ 10</span>
        </div>
        <div class="stat-periods">
          <div class="stat-period">
            <span class="stat-period-label">7-Day</span>
            <span class="stat-period-value" id="statMoodAvg7Sub">—</span>
          </div>
          <div class="stat-period">
            <span class="stat-period-label">30-Day</span>
            <span class="stat-period-value" id="statMoodAvg30">—</span>
          </div>
        </div>
        <span class="stat-trend" id="statMoodTrend">—</span>
      </div>

      <!-- Hours Slept -->
      <div class="trends-stat-card trends-stat-card--sleep">
        <div class="stat-category">
          <span class="stat-dot"></span>
          Hours Slept
        </div>
        <div class="stat-value-row">
          <span class="stat-value" id="statSleepAvg7">—</span>
          <span class="stat-unit">hrs avg</span>
        </div>
        <div class="stat-periods">
          <div class="stat-period">
            <span class="stat-period-label">7-Day</span>
            <span class="stat-period-value" id="statSleepAvg7Sub">—</span>
          </div>
          <div class="stat-period">
            <span class="stat-period-label">30-Day</span>
            <span class="stat-period-value" id="statSleepAvg30">—</span>
          </div>
        </div>
        <span class="stat-trend" id="statSleepTrend">—</span>
      </div>

      <!-- Sleep Quality -->
      <div class="trends-stat-card trends-stat-card--qual">
        <div class="stat-category">
          <span class="stat-dot"></span>
          Sleep Quality
        </div>
        <div class="stat-value-row">
          <span class="stat-value" id="statSleepQualAvg7">—</span>
          <span class="stat-unit">/ 10</span>
        </div>
        <div class="stat-periods">
          <div class="stat-period">
            <span class="stat-period-label">7-Day</span>
            <span class="stat-period-value" id="statSleepQualAvg7Sub">—</span>
          </div>
          <div class="stat-period">
            <span class="stat-period-label">30-Day</span>
            <span class="stat-period-value" id="statSleepQualAvg30">—</span>
          </div>
        </div>
        <span class="stat-trend" id="statSleepQualTrend">—</span>
      </div>

    </div>

    <!-- Date Range Filter -->
    <div class="trends-filter-bar">
      <div class="med-sub-tabs">
        <button class="ct-sub-tab-btn active" data-days="7">7 Days</button>
        <button class="ct-sub-tab-btn" data-days="30">30 Days</button>
        <button class="ct-sub-tab-btn" data-days="90">90 Days</button>
        <button class="ct-sub-tab-btn" data-days="0">All</button>
      </div>
    </div>

    <!-- Overlay Toggles -->
    <div class="trends-overlay-bar">
      <label class="trends-overlay-toggle">
        <input type="checkbox" id="overlayFunctionality" checked>
        <span class="trends-overlay-dot" style="background:var(--color-primary)"></span>
        Functionality
      </label>
      <label class="trends-overlay-toggle">
        <input type="checkbox" id="overlayMood">
        <span class="trends-overlay-dot" style="background:var(--color-success)"></span>
        Mood
      </label>
      <label class="trends-overlay-toggle">
        <input type="checkbox" id="overlayTotalSleep">
        <span class="trends-overlay-dot" style="background:var(--color-blue)"></span>
        Total Hours Slept
      </label>
      <label class="trends-overlay-toggle">
        <input type="checkbox" id="overlaySleepQuality">
        <span class="trends-overlay-dot" style="background:var(--color-purple)"></span>
        Sleep Quality
      </label>
      <label class="trends-overlay-toggle">
        <input type="checkbox" id="overlayMovingAvg">
        <span class="trends-overlay-dot" style="background:var(--color-warning)"></span>
        7-Day Avg Line
      </label>
    </div>

    <!-- Chart -->
    <div class="trends-chart-wrap">
      <canvas id="trends-chart-canvas"></canvas>
    </div>
  </section>
