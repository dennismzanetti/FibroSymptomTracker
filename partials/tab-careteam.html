  <!-- Care Team Tab -->
  <section id="careteam-tab" class="tab">
    <h2>Care Team</h2>
    <div class="med-sub-tabs">
      <button class="ct-sub-tab-btn active" data-ct-view="ctProvidersView">Providers</button>
      <button class="ct-sub-tab-btn" data-ct-view="ctApptsView">Appointments</button>
      <button class="ct-sub-tab-btn" data-ct-view="ctPrintView">Print</button>
    </div>
    <div id="ctProvidersView" class="ct-view">
      <div style="display:flex; justify-content:flex-end; margin-bottom:var(--space-4);">
        <button id="openCtAddModalBtn" class="btn btn-primary">&#43; Add Provider</button>
      </div>
      <div class="card"><h3>My Care Team</h3><ul id="ctProviderList" class="ct-provider-list"></ul></div>
    </div>
    <div id="ctApptsView" class="ct-view" style="display:none;">
      <div style="display:flex; justify-content:flex-end; margin-bottom:var(--space-4);">
        <button id="openApptAddModalBtn" class="btn btn-primary">&#43; Add Appointment</button>
      </div>
      <div class="card">
        <h3>Upcoming Appointments</h3>
        <ul id="ctUpcomingAppts" class="ct-appt-list"><li class="ct-empty">Loading&#8230;</li></ul>
      </div>
      <div class="card">
        <h3>Past Appointments</h3>
        <ul id="ctPastAppts" class="ct-appt-list"><li class="ct-empty">Loading&#8230;</li></ul>
      </div>
    </div>
    <div id="ctPrintView" class="ct-view" style="display:none;">
      <div class="card">
        <h3>Print</h3>
        <p style="font-size:0.875rem;color:var(--color-text-muted);margin-bottom:1rem;">Generates a print-ready summary of your care team and upcoming appointments.</p>
        <button id="printCtBtn" class="btn btn-primary">Print Care Team
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0;">
            <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
          </svg>
        </button>
      </div>
    </div>
  </section>
