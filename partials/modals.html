     style="display:none; position:fixed; inset:0; z-index:900; background:rgba(0,0,0,0.45); overflow-y:auto; padding:var(--space-6) var(--space-4);">
  <div style="background:var(--color-surface); border-radius:var(--radius-xl); max-width:540px; margin:auto; padding:var(--space-6); position:relative; box-shadow:var(--shadow-lg);">

    <h3 id="ctApptModalTitle" style="margin-bottom:var(--space-4);">Add Appointment</h3>
    <div class="form-group">
      <label for="ctApptProvider">Provider</label>
      <select id="ctApptProvider"><option value="">Select provider&hellip;</option></select>
    </div>
    <div class="form-row form-row-2">
      <div class="form-group">
        <label for="ctApptDate">Start Date</label>
        <input type="date" id="ctApptDate" />
      </div>
      <div class="form-group">
        <label for="ctApptEndDate">End Date <span style="font-weight:normal;color:var(--color-text-muted)">(optional)</span></label>
        <input type="date" id="ctApptEndDate" />
      </div>

      <div class="form-group">
        <label for="ctApptTime">Time</label>
        <input type="time" id="ctApptTime" />
      </div>

      <div class="form-group">
        <label for="ctApptLocation">Location</label>
        <input type="text" id="ctApptLocation" placeholder="Office, telehealth, hospital, etc." />
      </div>
      <div class="form-group">
        <label for="ctApptPurpose">Purpose / reason</label>
        <input type="text" id="ctApptPurpose" placeholder="Routine follow-up, new symptom, etc." />
      </div>

    <div class="form-group">
      <label for="ctApptPrepNotes">Prep notes</label>
      <textarea id="ctApptPrepNotes" rows="2" placeholder="Questions to ask, things to bring, etc."></textarea>

      <label for="ctApptPostNotes">Visit notes</label>
      <textarea id="ctApptPostNotes" rows="2" placeholder="What was discussed, next steps, etc."></textarea>
    </div>

      <div class="form-group">
        <label for="ctApptStatus">Status</label>

          <option value="upcoming">Upcoming</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="rescheduled">Rescheduled</option>
