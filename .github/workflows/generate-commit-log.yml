name: Generate commit-log.json

on:
  push:
    branches: [ main ]

jobs:
  commit-log:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 11
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build commit-log.json
        run: |
          git log -10 --pretty=format:"%H|%h|%aI|%s" \
            | while IFS='|' read -r sha short date msg; do
                jq -n \
                  --arg sha "$sha" \
                  --arg short "$short" \
                  --arg date "$date" \
                  --arg msg "$msg" \
                  --arg url "https://github.com/dennismzanetti/FibroSymptomTracker/commit/$sha" \
                  '{sha:$sha,short:$short,date:$date,message:$msg,url:$url}'
              done \
            | jq -s '.' > commit-log.json

      - name: Commit commit-log.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add commit-log.json
          git diff --cached --quiet || git commit -m "chore: update commit-log.json [skip ci]"
          git push
