name: Generate commit-log.json

on:
  push:
    branches: [ main ]

jobs:
  commit-log:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 11
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Build commit-log.json
        run: |
          git log -10 --pretty=format:"%H|%h|%aI|%s" \
            | while IFS='|' read -r sha short date msg; do
                jq -n \
                  --arg sha "$sha" \
                  --arg short "$short" \
                  --arg date "$date" \
                  --arg msg "$msg" \
                  --arg url "https://github.com/dennismzanetti/FibroSymptomTracker/commit/$sha" \
                  '{sha:$sha,short:$short,date:$date,message:$msg,url:$url}'
              done \
            | jq -s '.' > commit-log.json

      - name: Build build-info.js
        run: |
          SHA=$(git log -1 --pretty=format:"%H")
          SHORT=$(git log -1 --pretty=format:"%h")
          DATE=$(git log -1 --pretty=format:"%aI")
          MSG=$(git log -1 --pretty=format:"%s")
          URL="https://github.com/dennismzanetti/FibroSymptomTracker/commit/$SHA"
          mkdir -p js/core
          {
            echo "// build-info.js — Auto-generated by GitHub Actions on every push to main."
            echo "// Do NOT edit manually; changes will be overwritten."
            echo "window.BUILD_INFO = {"
            echo "  sha:     \"${SHORT}\","
            echo "  shaFull: \"${SHA}\","
            echo "  message: $(echo "$MSG" | jq -Rs '.'),"
            echo "  date:    \"${DATE}\","
            echo "  url:     \"${URL}\""
            echo "};"
          } > js/core/build-info.js

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/core/build-info.js commit-log.json
          git diff --cached --quiet || git commit -m "chore: update commit-log.json + build-info.js [skip ci]"
          git push
