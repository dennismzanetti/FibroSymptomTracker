<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Symptom Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <!-- Modular stylesheets -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/entry.css" />
  <link rel="stylesheet" href="css/history.css" />
  <link rel="stylesheet" href="css/journal.css" />
  <link rel="stylesheet" href="css/mood.css" />
  <link rel="stylesheet" href="css/medications.css" />
  <link rel="stylesheet" href="css/careteam.css" />
  <link rel="stylesheet" href="css/pain-map.css" />
  <!-- Legacy/extra overrides (kept for any rules not yet migrated) -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="partial-auth"></div>
<div id="partial-modals"></div>
<div class="app-wrapper">
  <div id="partial-header"></div>
  <main id="main-content">
    <div id="partial-tab-today"></div>
    <div id="partial-tab-journal"></div>
    <div id="partial-tab-history"></div>
    <div id="partial-tab-trends"></div>
    <div id="partial-tab-mood"></div>
    <div id="partial-tab-medications"></div>
    <div id="partial-tab-conditions"></div>
    <div id="partial-tab-careteam"></div>
    <div id="partial-tab-settings"></div>
  </main>
  <div class="build-footer" onclick="this.classList.toggle('expanded')" title="Tap to expand/collapse">
    FibroTracker &mdash; dennismzanetti &nbsp;|&nbsp;
    SHA: <span id="buildSha">&hellip;</span> &nbsp;|&nbsp;
    <span id="buildMsg">loading&hellip;</span>
  </div>
</div>

<!-- Diagnostics (must be first script — sets up global error handlers) -->
<script src="diagnostics.js"></script>

<!-- js/core/ -->
<script src="js/core/build-info.js"></script>
<script src="js/core/loader.js"></script>

<!-- Firebase v8 compat SDKs (must load before any app script) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- Chart.js (UMD build exposes global Chart used by trends.js and app.js) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<!-- js/utils/ -->
<script src="js/utils/date.js"></script>

<!-- js/utils/ (not yet moved) -->
<script src="ui.js"></script>

<!-- js/features/ (not yet moved) -->
<script src="entry.js"></script>
<script src="history.js"></script>
<script src="trends.js"></script>
<script src="journal.js"></script>
<script src="mood.js"></script>
<script src="medications.js"></script>
<script src="conditions.js"></script>
<script src="careteam.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>
</body>
</html>
